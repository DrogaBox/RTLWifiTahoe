#
# Crowdin configuration for RTL Wi-Fi Tahoe
# Docs: https://developer.crowdin.com/configuration-file/
#
# Setup:
#   1. Create a Crowdin project (Apple Strings / macOS)
#   2. export CROWDIN_PROJECT_ID=… CROWDIN_PERSONAL_TOKEN=…
#   3. crowdin upload sources
#   4. crowdin download   (after translations)
#
# Source language: English (en)
# Translations land in Resources/<lang>.lproj/Localizable.strings
#

"project_id_env": "CROWDIN_PROJECT_ID"
"api_token_env": "CROWDIN_PERSONAL_TOKEN"
"base_path": "."
"base_url": "https://api.crowdin.com"

"preserve_hierarchy": true

files:
  - source: /Resources/en.lproj/Localizable.strings
    translation: /Resources/%two_letters_code%.lproj/Localizable.strings
    type: strings
    # Skip source language in download path collision
    skip_untranslated_strings: false
    update_option: update_as_unapproved
    # Optional languages you care about first:
    # languages: [es, pt-BR, fr, de, it, ja, zh-CN]
